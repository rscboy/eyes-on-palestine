name: Article Integrity Monitor

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Optional article cap. In due mode this caps due articles; in force mode this caps selected articles."
        required: false
        default: ""
      offset:
        description: "Optional starting offset for forced scans"
        required: false
        default: "0"
      screenshots:
        description: "Capture screenshots for anomalous results only"
        required: false
        default: "false"
      review_interval_days:
        description: "Days before an article is due for automated recheck"
        required: false
        default: "60"
      max_due:
        description: "Maximum due articles to check when limit is blank"
        required: false
        default: "25"
      force:
        description: "Ignore due-only timing and use limit/offset"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: article-integrity-writes-main
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install checker dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-integrity.txt
          python -m playwright install --with-deps chromium

      - name: Run Article Integrity Monitor
        env:
          INPUT_LIMIT: ${{ github.event.inputs.limit }}
          INPUT_OFFSET: ${{ github.event.inputs.offset }}
          INPUT_SCREENSHOTS: ${{ github.event.inputs.screenshots }}
          INPUT_REVIEW_INTERVAL_DAYS: ${{ github.event.inputs.review_interval_days }}
          INPUT_MAX_DUE: ${{ github.event.inputs.max_due }}
          INPUT_FORCE: ${{ github.event.inputs.force }}
        run: |
          ARGS=""
          if [ -n "${INPUT_LIMIT}" ]; then
            ARGS="$ARGS --limit ${INPUT_LIMIT}"
          fi
          if [ -n "${INPUT_OFFSET}" ]; then
            ARGS="$ARGS --offset ${INPUT_OFFSET}"
          fi
          if [ "${INPUT_SCREENSHOTS}" = "true" ]; then
            ARGS="$ARGS --screenshots"
          fi
          if [ -n "${INPUT_REVIEW_INTERVAL_DAYS}" ]; then
            ARGS="$ARGS --review-interval-days ${INPUT_REVIEW_INTERVAL_DAYS}"
          else
            ARGS="$ARGS --review-interval-days 60"
          fi
          if [ -n "${INPUT_MAX_DUE}" ]; then
            ARGS="$ARGS --max-due ${INPUT_MAX_DUE}"
          else
            ARGS="$ARGS --max-due 25"
          fi
          if [ "${INPUT_FORCE}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          python scripts/article_integrity_monitor.py $ARGS

      - name: Sync latest main before commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Commit integrity results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update article integrity monitor results"
          file_pattern: data/integrity/
          branch: main
