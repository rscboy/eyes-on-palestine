name: update sitemap

on:
  push:
    branches:
      - main
    paths:
      - "data/blog_posts.json"
      - "blog/*.html"
      - "scripts/update_sitemap_from_blog_posts.mjs"
      - ".github/workflows/update-sitemap.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Rebuild sitemap
        run: node scripts/update_sitemap_from_blog_posts.mjs

      - name: Commit sitemap
        run: |
          if git diff --quiet -- sitemap.xml; then
            echo "No sitemap changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git commit -m "Update sitemap"
          git push
