name: Article Integrity Bulk Override

on:
  workflow_dispatch:
    inputs:
      payload:
        description: "Stringified JSON bulk override payload"
        required: true

permissions:
  contents: write

concurrency:
  group: article-integrity-writes-main
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Apply bulk manual overrides
        env:
          BULK_OVERRIDE_PAYLOAD: ${{ github.event.inputs.payload }}
        run: python scripts/apply_integrity_bulk_override.py

      - name: Sync latest main before commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Commit bulk manual overrides
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Apply article integrity bulk manual overrides"
          file_pattern: data/integrity/
          branch: main
