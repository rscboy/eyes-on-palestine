name: Article Integrity Manual Override

on:
  workflow_dispatch:
    inputs:
      article_id:
        description: "Article Integrity Monitor id"
        required: true
      manual_status:
        description: "Verified status"
        required: true
        type: choice
        options:
          - live
          - confirmed_live
          - redirected_live
          - confirmed_removed
          - confirmed_changed
          - likely_removed
          - changed_substantially
          - blocked_unknown
          - needs_manual_review
      verified_by:
        description: "Reviewer name or email"
        required: true
      notes:
        description: "Neutral verification notes"
        required: false
        default: ""
      screenshot_action:
        description: "Screenshot action"
        required: true
        default: "delete_after_review"
        type: choice
        options:
          - delete_after_review
          - keep_as_evidence
          - no_screenshot

permissions:
  contents: write

concurrency:
  group: article-integrity-writes-main
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Apply manual override
        run: |
          python scripts/apply_integrity_override.py \
            --id "${{ github.event.inputs.article_id }}" \
            --status "${{ github.event.inputs.manual_status }}" \
            --verified-by "${{ github.event.inputs.verified_by }}" \
            --notes "${{ github.event.inputs.notes }}" \
            --screenshot-action "${{ github.event.inputs.screenshot_action }}"

      - name: Sync latest main before commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Commit manual override
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Apply article integrity manual override"
          file_pattern: data/integrity/
          branch: main
