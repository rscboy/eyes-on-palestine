    <script>
        (function applyPostSpecificHeadMetadata() {
            const postSlug = new URLSearchParams(window.location.search).get("post");
            const metadata = ["incident-at-beth-jacob-my-response", "incident-at-beth-jacob"].includes(postSlug)
                ? {
                    title: "Incident at Beth Jacob: My Response",
                    description: "I have been dealing with a lot of complicated thoughts and emotions when it comes to this topic, but I feel that if I’m going to experience any kind of closure from this, I need to say something.",
                    url: "https://echoesofgaza.org/blog/incident-at-beth-jacob/",
                    image: "https://echoesofgaza.org/alexandria_blog_image.png",
                    imageAlt: "Alexandria at the Jewish Cultural Festival in Dayton",
                    twitterCard: "summary_large_image",
                    removeImages: false,
                    isPost: true
                }
                : {
                    title: "Voices from Echoes of Gaza",
                    description: "Stories, testimonies, and the lived consequences of standing for Palestine.",
                    url: "https://echoesofgaza.org/blog",
                    image: "https://i.postimg.cc/fT81SwN0/426559D6-9EF9-49AA-8A0B-84A3FA70B3E2.png",
                    imageAlt: "Echoes of Gaza favicon",
                    twitterCard: "summary",
                    removeImages: false,
                    isPost: false
                };

            document.title = metadata.title;

            const upsertMeta = (selector, attributes) => {
                let tag = document.head.querySelector(selector);
                if (!tag) {
                    tag = document.createElement("meta");
                    document.head.appendChild(tag);
                }
                Object.entries(attributes).forEach(([key, value]) => tag.setAttribute(key, value));
            };
            const getHeadShareImageMeta = (imageUrl) => {
                const path = String(imageUrl || "").toLowerCase().split("?")[0];
                if (path.endsWith(".svg")) return { type: "image/svg+xml", width: "1200", height: "630" };
                if (path.endsWith(".jpg") || path.endsWith(".jpeg")) return { type: "image/jpeg", width: "1200", height: "630" };
                if (path.endsWith(".webp")) return { type: "image/webp", width: "1200", height: "630" };
                return { type: "image/png", width: "1200", height: "630" };
            };

            upsertMeta('meta[name="description"]', { name: "description", content: metadata.description });
            const removeMeta = (selector) => {
                const tag = document.head.querySelector(selector);
                if (tag) tag.remove();
            };

            upsertMeta('meta[property="og:type"]', { property: "og:type", content: metadata.isPost ? "article" : "website" });
            upsertMeta('meta[property="og:title"]', { property: "og:title", content: metadata.title });
            upsertMeta('meta[property="og:description"]', { property: "og:description", content: metadata.description });
            upsertMeta('meta[property="og:url"]', { property: "og:url", content: metadata.url });
            if (metadata.removeImages) {
                removeMeta('meta[property="og:image"]');
                removeMeta('meta[property="og:image:secure_url"]');
                removeMeta('meta[property="og:image:type"]');
                removeMeta('meta[property="og:image:width"]');
                removeMeta('meta[property="og:image:height"]');
                removeMeta('meta[property="og:image:alt"]');
                removeMeta('meta[name="twitter:image"]');
                removeMeta('meta[name="twitter:image:alt"]');
            } else {
                upsertMeta('meta[property="og:image"]', { property: "og:image", content: metadata.image });
                upsertMeta('meta[property="og:image:secure_url"]', { property: "og:image:secure_url", content: metadata.image });
                const imageMeta = getHeadShareImageMeta(metadata.image);
                upsertMeta('meta[property="og:image:type"]', { property: "og:image:type", content: imageMeta.type });
                upsertMeta('meta[property="og:image:width"]', { property: "og:image:width", content: imageMeta.width });
                upsertMeta('meta[property="og:image:height"]', { property: "og:image:height", content: imageMeta.height });
                upsertMeta('meta[property="og:image:alt"]', { property: "og:image:alt", content: metadata.imageAlt });
                upsertMeta('meta[name="twitter:image"]', { name: "twitter:image", content: metadata.image });
                upsertMeta('meta[name="twitter:image:alt"]', { name: "twitter:image:alt", content: metadata.imageAlt });
            }
            upsertMeta('meta[name="twitter:card"]', { name: "twitter:card", content: metadata.twitterCard });
            upsertMeta('meta[name="twitter:title"]', { name: "twitter:title", content: metadata.title });
            upsertMeta('meta[name="twitter:description"]', { name: "twitter:description", content: metadata.description });
            upsertMeta('meta[name="twitter:url"]', { name: "twitter:url", content: metadata.url });
        })();
    </script>

                shareDescription: "I have been dealing with a lot of complicated thoughts and emotions when it comes to this topic, but I feel that if I’m going to experience any kind of closure from this, I need to say something.",

                content: `
                    <p><strong>Note:</strong> I will not be discussing anything outside of the scope of what I have witnessed firsthand. I know that this topic has had some impact outside of what I have been able to see personally, but I have no intention of speculating on events that are outside of my purview.</p>

                    <p>I have had over a month to mull this situation over in my head. I have been dealing with a lot of complicated thoughts and emotions when it comes to this topic, but I feel that if I’m going to experience any kind of closure from this, I need to say something. This is not a piece defending myself or an attempt to attack anyone. If it were up to me, this never would have happened, and I would have continued as things were, but unfortunately that is impossible. I’m sure that many people reading this have no idea what I’m talking about, so I’ll lay down some background, explain what happened, and attempt to clarify some points. Through this, I hope to lay a better path forward not only for myself, but also hopefully for the greater Jewish community.</p>

                    <figure class="float-right w-48 md:w-56 ml-6 mb-4 mt-2">
                        <img src="https://echoesofgaza.org/alexandria_blog_image.png" alt="Alexandria at the Jewish Cultural Festival in Dayton" class="w-full rounded-sm object-cover border border-border-gray opacity-90 hover:opacity-100 transition-opacity">
                        <figcaption class="text-[11px] text-ash-gray mt-2 font-sans leading-tight text-right italic">Alexandria at the Jewish Cultural Festival in Dayton</figcaption>
                    </figure>

                    <p>First, for those who don’t know who I am, I am Alexandria King (Hebrew Name: נחמה בת אברהם ושרה) and I am a twenty-nine-year-old college student in Dayton, Ohio, direct support professional, and a proud Jew by choice. I am a member of Temple Israel (a reform synagogue in Dayton) and had been attending services at Beth Jacob Synagogue (an Orthodox synagogue) off and on for some time. The appeal of attending Beth Jacob services despite the fact that I am not the most frum (observant) person was that I found great comfort in the ritual of the Orthodox service. I enjoyed coming in early, going through the liturgy, and hearing the entire Torah and Haftorah portions. Most importantly, I always looked forward to Rabbi Agar’s drashes (sermons). I was always interested to see where he was going to take the portion and what stories he was going to tell; however, services didn’t always go smoothly. I can recall on at least one occasion where service was interrupted by someone going into the hallway and throwing a fit (this is what those in the storytelling business call foreshadowing.)</p>

                    <p>It was the 28th of February when, as was normal for me at this point, I went to services at Beth Jacob. Nothing was out of the ordinary, me and my partner Isaac were worshiping on separate sides of the מחיצה (mechitza, a divider at an Orthodox Synagogue to split men and women) when suddenly there was a commotion in the hallway. There was a woman who was terribly upset about someone being allowed at the synagogue. It was hard to make it out, but they were yelling phrases such as “sin against god,” “they’re not a member,” “anti-Israel,” “pro-Pali,” and “it’s them or me.” There was a point in that diatribe in which I was pretty certain that this person was referring to me, and when I looked back to see Leibel (Rabbi Agar) gesturing me to come back, my suspicions were confirmed. He asked me to leave. I was willing, albeit with consternation, quietly and without fuss. That is until the woman, as I was leaving, decided that she wanted to put salt on the wound and say things to my face. I was already in fight or flight mode, a feeling that was remarkably familiar to me and was reminiscent of times I have been physically attacked, and decided to tell her, in some impolite words, to get out of my face. From there I left and began to have an emotional breakdown in my car. The next week, I was contacted by a detective from the Sheriff’s office that I was asked to not return to the synagogue because of MY disturbance and rude language (and specifically not because of my views or where I was sitting, according to them.)</p>

                    <p>I have had a lot of feelings about this situation, but the main one is one of deep hurt. I felt like I was being abandoned by someone I once considered a friend and a trusted community leader. I felt like I was no longer safe in my Jewish Community because of who I am. A woman who I have never met before comes in and yells about me, and I’m the one who must leave? It makes no sense to me, and it feels like they were looking for an excuse not to have me come, and this just fell into their laps. I can’t honestly think of any other explanation than either malice or incompetence, and I’d believe either one at this point.</p>

                    <p>Now, I want to make one thing explicit: yes, I am and have always been staunchly for the self-determination of the Palestinian people. I believe that Israel’s actions on that front have been and continue to be abhorrent. At the same time, I believe deeply in the safety, dignity, and self-determination of Jewish people. I do not at all believe that these commitments are contradictory. I am a person who believes that if we want something to be better, we must be able to criticize it. The Torah calls for us to be a holy nation and to pursue justice justly, and I do not believe that the state of Israel holds itself to that standard. I will continue to work toward betterment; however, that does not make me an antisemite or worthy of being excluded from Jewish spaces.</p>

                    <p>To conclude, I just want to say that I am not sure what will come out of this. I know that there have already been discussions about what happened on that day to which I am not privy. Despite my efforts to keep this in my small circle of disclosure, I should’ve known that it was going to get out regardless of who I spoke to. I just want to say that even though I am hurt still, this is not something that happens in all Jewish Spaces. There have been countless spaces that my Queer Pro-Palestinian Jewish self has felt wholly welcome in. This is more so a cautionary tale that not all Jewish spaces are safe, and that not all leadership can lead.</p>
                `
            }
        ];

        function escapeHTML(value) {

        function getShareImageMeta(imageUrl) {

        function compactBylineText(value) {
            const text = String(value || "").trim();

            return text.split(/\s+\/\s+/)[0].trim() || text;
        }

        function repairBlogTextSegment(value) {
            return String(value || "")
                .replace(/Hebrew Name:\s*\?{3,}\s+\?{2}\s+\?{3,}\s+\?{3,}/g, "Hebrew Name: נחמה בת אברהם ושרה")
                .replace(/Alexandria Gary King\s*\/\s*\?{3,}\s+\?{2}\s+\?{3,}\s+\?{3,}/g, "Alexandria Gary King / נחמה בת אברהם ושרה")
                .replace(/sides of the\s+\?{3,}\s+\(mechitza/g, "sides of the מחיצה (mechitza")
                .replace(/&apos;|&#39;|&#x27;|&#8217;|&#x2019;/gi, "'")
                .replace(/&quot;|&#34;|&#8220;|&#8221;|&#x201c;|&#x201d;/gi, '"')
                .replace(/[\u2018\u2019\u201A\u201B]|â€™|â€˜/g, "'")
                .replace(/[\u201C\u201D\u201E\u201F]|â€œ|â€�/g, '"')
                .replace(/[\u2013\u2014]|â€“|â€”/g, "-")
                .replace(/(\S)\s+\?\s+(\S)/g, "$1 - $2")
                .replace(/(^|[\s(])\?([^?\n<>]{1,80})\?([\s.,;:!)]|$)/g, '$1"$2"$3')
                .replace(/\b([A-Za-z]+n)\?t\b/g, "$1't")
                .replace(/([A-Za-z])\?s\b/g, "$1's")
                .replace(/\b([A-Za-z]+)\?(re|ve|ll|d|m)\b/g, "$1'$2")
                .replace(/([A-Za-z0-9])\?([A-Za-z0-9])/g, "$1-$2")
                .replace(/\u00A0/g, " ");
        }

        function repairBlogText(value) {
            return repairBlogTextSegment(value).trim();
        }

        function repairBlogHtml(value) {
            return String(value || "")
                .split(/(<[^>]+>)/g)
                .map((part) => /^<[^>]+>$/.test(part) ? part : repairBlogTextSegment(part))
                .join("");
        }

        function normalizeBlogImageUrl(url) {
            const clean = String(url || "").trim().replace(/&amp;/g, "&");
            const match = clean.match(/^https:\/\/github\.com\/([^/]+)\/([^/]+)\/blob\/([^/]+)\/(.+?)(?:\?.*)?$/i);
            if (match) {
                return `https://raw.githubusercontent.com/${match[1]}/${match[2]}/${match[3]}/${match[4]}`;
            }
            return clean;
        }

        function normalizeBlogImageSources(html) {
            return String(html || "").replace(/(<img\b[^>]*\bsrc=)(["'])(.*?)\2/gi, (match, prefix, quote, url) => {
                const normalized = normalizeBlogImageUrl(url).replace(/"/g, "%22").replace(/'/g, "%27");
                return `${prefix}${quote}${normalized}${quote}`;
            });
        }

        function getFirstEmbeddedImage(html) {
            const match = String(html || "").match(/<img\b[^>]*\bsrc=(["'])(.*?)\1/i);
            return match ? normalizeBlogImageUrl(match[2]) : "";
        }

        function normalizeBlogPost(post, index) {
            const id = post.id || post.slug || `published-${index}`;
            const author = post.author || {};
            const authorName = typeof author === "string" ? author : (author.name || "Anonymous contributor");
            const displayAuthor = post.displayAuthor || post.bylineAuthor || compactBylineText(authorName);
            const fullDisplayDate = post.displayDate || post.date || post.publishedAt || "";
            const displayDateShort = post.displayDateShort || post.compactDate || compactBylineText(fullDisplayDate);
            const content = normalizeBlogImageSources(repairBlogHtml(post.content || post.body || ""));
            const firstListImage = Array.isArray(post.images) ? normalizeBlogImageUrl(post.images[0]) : "";
            const embeddedImage = getFirstEmbeddedImage(content);
            const shareImage = normalizeBlogImageUrl(post.shareImage || post.featureImage || firstListImage || embeddedImage);
            const featureImage = normalizeBlogImageUrl(post.featureImage || post.shareImage || firstListImage || embeddedImage);
            return {
                id,
                slug: post.slug || String(id).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, ""),
                path: post.path || (post.slug ? `${post.slug}.html` : ""),
                title: repairBlogText(post.title || "Untitled"),
                subtitle: repairBlogText(post.subtitle || post.shareDescription || ""),
                shareDescription: repairBlogText(post.shareDescription || post.subtitle || ""),
                shareImage,
                featureImage,
                generatedThumbnail: Boolean(post.generatedThumbnail),
                author: repairBlogText(authorName),
                displayAuthor: repairBlogText(displayAuthor),
                authorImg: author.photoUrl || post.authorImg || "",
                role: repairBlogText(author.role || post.role || ""),
                authorLocation: repairBlogText(author.location || post.authorLocation || ""),
                authorBio: repairBlogText(author.bio || post.authorBio || ""),
                authorLinks: author.links || [],
                date: fullDisplayDate,
                displayDateShort,
                readTime: post.readTime || estimateReadTime(post.content || post.body || ""),
                citations: Number(post.citations || 0),
                comments: Number(post.comments || 0),
                viewCount: Number(post.viewCount || 0),
                content,
                publishedAt: post.publishedAt || post.date || "",
                scheduledAt: post.scheduledAt || "",
                status: post.status || "published"
            };
        }

        function estimateReadTime(content) {
            const words = String(content || "").replace(/<[^>]+>/g, " ").trim().split(/\s+/).filter(Boolean).length;
            return `${Math.max(1, Math.ceil(words / 220))} min read`;
        }

        function parseBlogDate(value) {
            const parsed = Date.parse(value || "");
            return Number.isFinite(parsed) ? parsed : 0;
        }

        function isPostPublic(post) {
            const scheduledTime = parseBlogDate(post.scheduledAt || post.publishedAt);
            if (post.status === "scheduled" && scheduledTime && scheduledTime > Date.now()) return false;
            return post.status !== "draft" && post.status !== "deleted";
        }

        async function loadPublishedBlogPosts() {
            try {
                const response = await fetch("./data/blog_posts.json?v=" + Date.now());
                if (!response.ok) return;
                const data = await response.json();
                const published = Array.isArray(data) ? data : (data.posts || []);
                const normalized = published.map(normalizeBlogPost).filter(isPostPublic);
                normalized.forEach((post) => {
                    for (let index = posts.length - 1; index >= 0; index -= 1) {
                        const existing = posts[index];
                        if (
                            String(existing.id || "") === String(post.id || "") ||
                            (existing.slug && post.slug && existing.slug === post.slug)
                        ) {
                            posts.splice(index, 1);
                        }
                    }
                    posts.push(post);
                });
                posts.sort((a, b) => parseBlogDate(b.publishedAt || b.date) - parseBlogDate(a.publishedAt || a.date));
            } catch (error) {
                console.warn("Published blog JSON could not be loaded", error);
            }
        }

        function removeMeta(selector) {
            const tag = document.head.querySelector(selector);
            if (tag) tag.remove();
        }

        function upsertMeta(selector, attributes) {
            let tag = document.head.querySelector(selector);
            if (!tag) {
                tag = document.createElement("meta");
                document.head.appendChild(tag);
            }
            Object.entries(attributes).forEach(([key, value]) => tag.setAttribute(key, value));
        }

        function ensureFavicon() {
            let favicon = document.head.querySelector('link[rel="icon"]');
            if (!favicon) {
                favicon = document.createElement("link");
                favicon.setAttribute("rel", "icon");
                document.head.appendChild(favicon);
            }
            favicon.setAttribute("href", SITE_FAVICON);
            favicon.setAttribute("type", "image/png");
        }

        function setSeoMeta(post = null) {

            const pageDescription = post ? (post.shareDescription || post.subtitle || SITE_DESCRIPTION) : SITE_DESCRIPTION;
            const pageUrl = post ? getPostUrl(post) : SITE_URL;
            const pageImage = post ? (post.shareImage || post.featureImage || null) : SITE_FAVICON;

            document.title = pageTitle;
            ensureFavicon();
            upsertMeta('meta[name="description"]', { name: "description", content: pageDescription });
            upsertMeta('meta[property="og:type"]', { property: "og:type", content: "article" });
            upsertMeta('meta[property="og:site_name"]', { property: "og:site_name", content: "Echoes of Gaza" });
            upsertMeta('meta[property="og:title"]', { property: "og:title", content: pageTitle });
            upsertMeta('meta[property="og:description"]', { property: "og:description", content: pageDescription });
            if (pageImage) {
                const imageMeta = getShareImageMeta(pageImage);
                upsertMeta('meta[property="og:image"]', { property: "og:image", content: pageImage });
                upsertMeta('meta[property="og:image:secure_url"]', { property: "og:image:secure_url", content: pageImage });
                upsertMeta('meta[property="og:image:type"]', { property: "og:image:type", content: imageMeta.type });
                upsertMeta('meta[property="og:image:width"]', { property: "og:image:width", content: imageMeta.width });
                upsertMeta('meta[property="og:image:height"]', { property: "og:image:height", content: imageMeta.height });
                upsertMeta('meta[property="og:image:alt"]', { property: "og:image:alt", content: `${pageTitle} thumbnail` });
            } else {
                removeMeta('meta[property="og:image"]');
                removeMeta('meta[property="og:image:secure_url"]');
                removeMeta('meta[property="og:image:type"]');
                removeMeta('meta[property="og:image:width"]');
                removeMeta('meta[property="og:image:height"]');
                removeMeta('meta[property="og:image:alt"]');
            }
            const hasLargeShareImage = Boolean(post && pageImage);
            upsertMeta('meta[property="og:url"]', { property: "og:url", content: pageUrl });
            upsertMeta('meta[name="twitter:card"]', { name: "twitter:card", content: hasLargeShareImage ? "summary_large_image" : "summary" });
            upsertMeta('meta[name="twitter:title"]', { name: "twitter:title", content: pageTitle });
            upsertMeta('meta[name="twitter:description"]', { name: "twitter:description", content: pageDescription });
            upsertMeta('meta[name="twitter:url"]', { name: "twitter:url", content: pageUrl });

                upsertMeta('meta[name="twitter:image"]', { name: "twitter:image", content: pageImage });
                upsertMeta('meta[name="twitter:image:alt"]', { name: "twitter:image:alt", content: `${pageTitle} thumbnail` });
            } else {
                removeMeta('meta[name="twitter:image"]');
                removeMeta('meta[name="twitter:image:alt"]');
            }
        }

        function blogVisitorKey() {
            const storageKey = "echoesBlogVisitorKey";
            let value = localStorage.getItem(storageKey);
            if (!value) {
                value = `visitor-${Date.now()}-${Math.random().toString(36).slice(2)}`;
                localStorage.setItem(storageKey, value);
            }
            return value;

        function shouldRecordView(post) {
            const key = `echoesBlogViewed:${post.slug || post.id}`;
            const last = Number(localStorage.getItem(key) || 0);
            const twelveHours = 12 * 60 * 60 * 1000;
            if (Date.now() - last < twelveHours) return false;
            localStorage.setItem(key, String(Date.now()));
            return true;
        }

        async function fetchBlogEngagement(post, recordView = false) {
            const params = new URLSearchParams({
                action: "getBlogEngagement",
                postId: post.id || "",
                postSlug: post.slug || "",
                visitorKey: blogVisitorKey()
            });

            const response = await fetch(`${BLOG_BACKEND_URL}?${params.toString()}`);
            const data = await response.json();
            if (data.result !== "success") {
                throw new Error(data.message || "Could not load blog engagement.");
            }

            if (recordView && shouldRecordView(post)) {
                return recordBlogView(post);
            }

            return data;
        }

        async function recordBlogView(post) {
            const response = await fetch(BLOG_BACKEND_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({
                    action: "recordBlogView",
                    postId: post.id || "",
                    postSlug: post.slug || "",
                    visitorKey: blogVisitorKey(),
                    userAgent: navigator.userAgent || ""
                })
            });
            const data = await response.json();
            if (data.result !== "success") {
                throw new Error(data.message || "Could not record blog view.");
            }
            return data;
        }

        function renderBlogEngagement(data) {
            currentEngagementData = data;
            const views = document.getElementById("post-view-count");
            const comments = document.getElementById("post-comments-count");

            const list = document.getElementById("comments-list");

            if (views) views.textContent = `${formatCount(data.viewCount)} view${Number(data.viewCount) === 1 ? "" : "s"}`;
            if (comments) comments.textContent = `${formatCount(data.commentCount)} response${Number(data.commentCount) === 1 ? "" : "s"}`;
            if (heading) heading.textContent = `Responses (${formatCount(data.commentCount)})`;

            if (!list) return;
            const items = Array.isArray(data.comments) ? data.comments : [];
            if (!items.length) {
                list.innerHTML = `<p class="text-sm text-ash-gray font-sans italic">No responses yet. Be the first to leave one.</p>`;
                return;
            }

            list.innerHTML = renderCommentThread(items, data.postId, data.postSlug);
        }

        function commentIdentity(comment, index = 0) {
            if (comment.id) return String(comment.id);
            return [
                comment.authorName || "Anonymous",
                comment.submittedAt || "",
                comment.comment || "",
                index
            ].join("|");
        }

        function renderCommentThread(items, postId, postSlug) {
            const normalized = items.map((comment, index) => ({
                ...comment,
                id: commentIdentity(comment, index),
                parentId: String(comment.parentId || "")
            }));
            const byParent = normalized.reduce((map, comment) => {
                const key = comment.parentId || "";
                if (!map[key]) map[key] = [];
                map[key].push(comment);
                return map;
            }, {});

            const renderLevel = (parentId = "", depth = 0) => (byParent[parentId] || []).map((comment) => {
                const replies = renderLevel(String(comment.id), depth + 1);
                return renderCommentCard(comment, postId, postSlug, replies, depth);
            }).join("");

            return renderLevel();
        }

        function renderCommentCard(comment, postId, postSlug, replies, depth) {
            const reactionCounts = COMMENT_REACTIONS
                .map((reaction) => ({ ...reaction, count: Number((comment.reactions || {})[reaction.key] || 0) }))
                .filter((reaction) => reaction.count > 0);
            const totalReactions = reactionCounts.reduce((sum, reaction) => sum + reaction.count, 0);
            const viewerReaction = COMMENT_REACTIONS.find((reaction) => reaction.key === comment.viewerReaction);
            const reactionLabel = viewerReaction ? viewerReaction.label : "Like";
            const reactionIcon = viewerReaction ? viewerReaction.icon : `<i class="ph ph-thumbs-up"></i>`;
            const escapedCommentId = escapeHTML(comment.id || "");
            const likeCount = Number((comment.reactions || {}).like || 0);

            return `
                <article class="border-t border-border-gray py-4" data-comment-id="${escapedCommentId}">
                    <div class="flex items-baseline justify-between gap-3 mb-2">
                        <h4 class="text-sm text-off-white font-sans font-semibold">${escapeHTML(comment.authorName || "Anonymous")}</h4>
                        <time class="text-[11px] text-ash-gray font-sans uppercase tracking-[0.12em]">${escapeHTML(formatCommentDate(comment.submittedAt))}</time>
                    </div>
                    <p class="text-sm text-ash-gray font-sans leading-relaxed whitespace-pre-line mb-3">${escapeHTML(comment.comment || "")}</p>
                    <div class="flex flex-wrap items-center gap-3 mb-3">
                        <button type="button" class="comment-action ${viewerReaction ? "is-active" : ""}" onclick='reactToComment(${JSON.stringify(postId)}, ${JSON.stringify(postSlug)}, ${JSON.stringify(comment.id)}, ${JSON.stringify(viewerReaction ? viewerReaction.key : "like")})'>
                            <span>${reactionIcon}</span><span>${escapeHTML(reactionLabel)}</span>
                        </button>
                        <button type="button" class="comment-action" onclick='toggleReplyForm(${JSON.stringify(comment.id)})'>
                            <i class="ph ph-chat-circle-dots"></i><span>Reply</span>
                        </button>
                        ${totalReactions ? `
                            <span class="reaction-summary" title="${escapeHTML(reactionCounts.map((reaction) => `${reaction.label}: ${reaction.count}`).join(", "))}">
                                <span>👍</span>
                                <span>${formatCount(likeCount)}</span>
                            </span>
                        ` : ""}
                    </div>
                    <form id="reply-form-${escapedCommentId}" class="hidden space-y-3 mb-4" onsubmit='submitBlogComment(event, ${JSON.stringify(postId)}, ${JSON.stringify(postSlug)}, ${JSON.stringify(comment.id)})'>
                        <input type="hidden" name="parentId" value="${escapedCommentId}">
                        <div>
                            <label class="block text-[10px] text-ash-gray font-sans uppercase tracking-[0.18em] mb-2">Name</label>
                            <input name="authorName" class="comment-field px-3 py-2" maxlength="80" required placeholder="Your name" value="${escapeHTML(localStorage.getItem("echoesBlogCommentName") || "")}">
                        </div>
                        <div>
                            <label class="block text-[10px] text-ash-gray font-sans uppercase tracking-[0.18em] mb-2">Reply</label>
                            <textarea name="comment" class="comment-field px-3 py-3 min-h-[90px]" maxlength="2000" required placeholder="Write a reply..."></textarea>
                        </div>
                        <div class="flex flex-col sm:flex-row sm:items-center gap-3 justify-between">
                            <p class="comment-form-status text-xs text-ash-gray font-sans min-h-4"></p>
                            <button type="submit" class="border border-[#8C0D0D] px-4 py-2 text-[11px] text-off-white font-sans uppercase tracking-[0.16em] hover:bg-[#8C0D0D]/15 transition disabled:opacity-50 disabled:pointer-events-none">
                                Post Reply
                            </button>
                        </div>
                    </form>
                    ${replies ? `<div class="comment-replies">${replies}</div>` : ""}
                </article>
            `;
        }

        async function loadBlogEngagement(post, recordView = false) {
            try {
                const data = await fetchBlogEngagement(post, recordView);
                post.viewCount = Number(data.viewCount || 0);
                post.comments = Number(data.commentCount || 0);
                renderBlogEngagement(data);
            } catch (error) {
                console.warn("Blog engagement could not be loaded", error);
                const status = document.getElementById("comment-status");
                if (status) status.textContent = "Responses are temporarily unavailable.";
            }
        }

        function updateIndexEngagementCard(post, data) {
            const key = CSS.escape(String(post.slug || post.id || ""));
            const views = document.querySelector(`[data-index-views="${key}"]`);
            const comments = document.querySelector(`[data-index-comments="${key}"]`);
            const viewCount = Number(data.viewCount || 0);
            const commentCount = Number(data.commentCount || 0);

            post.viewCount = viewCount;
            post.comments = commentCount;
            if (views) views.textContent = formatCount(viewCount);
            if (comments) comments.textContent = formatCount(commentCount);
        }

        async function hydrateBlogIndexEngagement() {
            await Promise.allSettled(posts.map(async (post) => {
                const data = await fetchBlogEngagement(post, false);
                updateIndexEngagementCard(post, data);
            }));
        }

        function toggleReplyForm(commentId) {
            const form = document.getElementById(`reply-form-${commentId}`);
            if (!form) return;
            form.classList.toggle("hidden");
            if (!form.classList.contains("hidden")) {
                const name = form.querySelector("[name='authorName']");
                const comment = form.querySelector("[name='comment']");
                (name && !name.value ? name : comment)?.focus();
            }
        }

        function findCommentInEngagement(commentId) {
            if (!currentEngagementData || !Array.isArray(currentEngagementData.comments)) return null;
            return currentEngagementData.comments.find((comment, index) => commentIdentity(comment, index) === String(commentId)) || null;
        }

        function optimisticallyToggleLike(commentId) {
            const comment = findCommentInEngagement(commentId);
            if (!comment) return;

            const reactions = { ...(comment.reactions || {}) };
            const currentLikes = Number(reactions.like || 0);
            if (comment.viewerReaction === "like") {
                comment.viewerReaction = "";
                reactions.like = Math.max(0, currentLikes - 1);
            } else {
                comment.viewerReaction = "like";
                reactions.like = currentLikes + 1;
            }
            comment.reactions = reactions;
            renderBlogEngagement(currentEngagementData);
        }

        function appendOptimisticComment({ postId, postSlug, parentId, authorName, comment }) {
            if (!currentEngagementData) return "";
            const optimisticId = `pending-${Date.now()}-${Math.random().toString(36).slice(2)}`;
            const optimistic = {
                id: optimisticId,
                parentId: parentId || "",
                authorName,
                comment,
                submittedAt: new Date().toISOString(),
                reactions: {},
                viewerReaction: "",
                pending: true
            };

            currentEngagementData = {
                ...currentEngagementData,
                postId: currentEngagementData.postId || postId,
                postSlug: currentEngagementData.postSlug || postSlug,
                commentCount: Number(currentEngagementData.commentCount || 0) + 1,
                comments: [...(currentEngagementData.comments || []), optimistic]
            };
            renderBlogEngagement(currentEngagementData);
            return optimisticId;
        }

        function removeOptimisticComment(commentId) {
            if (!currentEngagementData || !commentId) return;
            currentEngagementData = {
                ...currentEngagementData,
                commentCount: Math.max(0, Number(currentEngagementData.commentCount || 0) - 1),
                comments: (currentEngagementData.comments || []).filter((comment) => String(comment.id || "") !== String(commentId))
            };
            renderBlogEngagement(currentEngagementData);
        }

        async function reactToComment(postId, postSlug, commentId, reaction) {
            optimisticallyToggleLike(commentId);
            try {
                const response = await fetch(BLOG_BACKEND_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({
                        action: "reactBlogComment",
                        postId,
                        postSlug,
                        commentId,
                        reaction,
                        visitorKey: blogVisitorKey()
                    })
                });
                const data = await response.json();
                if (data.result !== "success") {
                    throw new Error(data.message || "Could not save reaction.");
                }
                renderBlogEngagement(data);
            } catch (error) {
                optimisticallyToggleLike(commentId);
                showToast(error.message || "Could not save reaction.");
            }
        }

        async function submitBlogComment(event, postId, postSlug, parentId = "") {
            event.preventDefault();
            const form = event.currentTarget;
            const status = form.querySelector(".comment-form-status") || document.getElementById("comment-status");
            const submitButton = form.querySelector("button[type='submit']");
            const nameInput = form.querySelector("[name='authorName']");
            const commentInput = form.querySelector("[name='comment']");
            const authorName = nameInput.value.trim();
            const comment = commentInput.value.trim();
            const originalComment = comment;

            if (!authorName) {
                status.textContent = "Please add a name before commenting.";
                nameInput.focus();
                return;
            }

            if (!comment) {
                status.textContent = "Please write a response before submitting.";
                commentInput.focus();
                return;
            }

            localStorage.setItem("echoesBlogCommentName", authorName);
            submitButton.disabled = true;
            submitButton.textContent = "Posting...";
            status.textContent = "";
            commentInput.value = "";
            const optimisticId = appendOptimisticComment({ postId, postSlug, parentId, authorName, comment: originalComment });

            try {
                const response = await fetch(BLOG_BACKEND_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({
                        action: "submitBlogComment",
                        postId,
                        postSlug,
                        parentId,
                        authorName,
                        comment: originalComment,
                        visitorKey: blogVisitorKey()
                    })
                });
                const data = await response.json();
                if (data.result !== "success") {
                    throw new Error(data.message || "Could not post response.");
                }
                status.textContent = parentId ? "Reply posted." : "Response posted.";
                renderBlogEngagement(data);
                const post = findPostByKey(postSlug || postId);
                if (post) updateIndexEngagementCard(post, data);
            } catch (error) {
                removeOptimisticComment(optimisticId);
                status.textContent = error.message || "Could not post response.";
                commentInput.value = originalComment;
            } finally {
                submitButton.disabled = false;
                submitButton.textContent = parentId ? "Post Reply" : "Post Response";
            }
        }

        function removeShareMenu() {
            document.querySelectorAll(".blog-share-menu").forEach((menu) => menu.remove());
        }

        function sharePost(event, id) {
            if (event) {
                event.preventDefault();
                event.stopPropagation();
            }
            const post = findPostByKey(id);
            if (!post) return;
            const postUrl = getPostUrl(post);

            removeShareMenu();
            const menu = document.createElement("div");
            menu.className = "blog-share-menu";
            menu.setAttribute("role", "menu");
            menu.innerHTML = `
                <a href="${escapeHTML(getShareUrl("x", post))}" target="_blank" rel="noopener noreferrer" role="menuitem">
                    <i class="ph ph-x-logo"></i>
                    <span>Share to X</span>
                </a>
                <a href="${escapeHTML(getShareUrl("facebook", post))}" target="_blank" rel="noopener noreferrer" role="menuitem">
                    <i class="ph ph-facebook-logo"></i>
                    <span>Share to Facebook</span>
                </a>
                <button type="button" onclick='shareToInstagram(${JSON.stringify(post.id)})' role="menuitem">
                    <i class="ph ph-instagram-logo"></i>
                    <span>Instagram</span>
                </button>
                <button type="button" onclick='copyPostLink(${JSON.stringify(post.id)})' role="menuitem">
                    <i class="ph ph-link-simple"></i>
                    <span>Copy Link</span>
                </button>
            `;

            document.body.appendChild(menu);
            const rect = event?.currentTarget?.getBoundingClientRect();
            const left = Math.min(Math.max(12, rect ? rect.right - menu.offsetWidth : window.innerWidth - menu.offsetWidth - 12), window.innerWidth - menu.offsetWidth - 12);
            const top = Math.min(Math.max(12, rect ? rect.bottom + 8 : 80), window.innerHeight - menu.offsetHeight - 12);
            menu.style.left = `${left}px`;
            menu.style.top = `${top}px`;

            setTimeout(() => {
                document.addEventListener("click", removeShareMenu, { once: true });
            }, 0);
        }

        function getShareUrl(platform, post) {
            const postUrl = getPostUrl(post);
            const title = post.title || "Echoes of Gaza";
            if (platform === "facebook") {
                return `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(postUrl)}`;
            }
            return `https://twitter.com/intent/tweet?url=${encodeURIComponent(postUrl)}&text=${encodeURIComponent(title)}`;
        }

        function copyPostLink(id, message = "Link copied to clipboard") {
            const post = findPostByKey(id);
            if (!post) return;
            removeShareMenu();
            const postUrl = getPostUrl(post);
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(postUrl).then(() => {
                    showToast(message);
                }).catch(() => {
                    fallbackCopyTextToClipboard(postUrl, message);
                });
            } else {
                fallbackCopyTextToClipboard(postUrl, message);
            }
        }

        function shareToInstagram(id) {
            copyPostLink(id, "Link copied. Paste it into your Instagram post or story.");
            window.open("https://www.instagram.com/", "_blank", "noopener,noreferrer");
        }

        function fallbackCopyTextToClipboard(text, successMessage = "Link copied to clipboard") {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed"; 
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            
            try {
                const successful = document.execCommand('copy');
                if(successful) showToast(successMessage);
                else showToast("Failed to copy link");
            } catch (err) {
                showToast("Failed to copy link");
            }
            document.body.removeChild(textArea);
        }

        // --- RENDER FUNCTIONS ---
        let contributorCatalogPage = 1;
        const CONTRIBUTORS_PER_PAGE = 5;

        function contributorKey(name) {
            return String(name || "Anonymous contributor").trim().toLowerCase();
        }

        function getContributorCatalog() {
            const map = new Map();

            posts.forEach((post) => {
                const name = post.displayAuthor || post.author || "Anonymous contributor";
                const key = contributorKey(name);
                const existing = map.get(key) || {
                    name,
                    role: post.role || "",
                    image: post.authorImg || "",
                    bio: post.authorBio || "",
                    links: Array.isArray(post.authorLinks) ? post.authorLinks : [],
                    postCount: 0,
                    latestDate: "",
                    posts: []
                };

                existing.postCount += 1;
                if (!existing.role && post.role) existing.role = post.role;
                if (!existing.image && post.authorImg) existing.image = post.authorImg;
                if (!existing.bio && post.authorBio) existing.bio = post.authorBio;
                if ((!existing.links || !existing.links.length) && Array.isArray(post.authorLinks)) existing.links = post.authorLinks;
                if (parseBlogDate(post.publishedAt || post.date) >= parseBlogDate(existing.latestDate)) {
                    existing.latestDate = post.publishedAt || post.date || existing.latestDate;
                }
                existing.posts.push({
                    id: post.id,
                    slug: post.slug,
                    title: post.title,
                    date: post.displayDateShort || post.date,
                    url: getPostUrl(post)
                });

                map.set(key, existing);
            });

            return Array.from(map.values()).sort((a, b) => {
                const dateDiff = parseBlogDate(b.latestDate) - parseBlogDate(a.latestDate);
                if (dateDiff) return dateDiff;
                return a.name.localeCompare(b.name);
            });
        }

        function contributorAvatar(contributor, sizeClass = "w-8 h-8", textClass = "text-xs") {
            const initial = escapeHTML(String(contributor.name || "A").charAt(0));
            return `
                <div class="${sizeClass} rounded-full bg-hover-bg border border-border-gray flex items-center justify-center ${textClass} text-ash-gray font-serif overflow-hidden shrink-0">
                    ${contributor.image ? `<img src="${escapeHTML(contributor.image)}" alt="${escapeHTML(contributor.name)}" class="w-full h-full object-cover">` : initial}
                </div>
            `;
        }

        function renderContributorSidebar() {
            const contributors = getContributorCatalog();
            const visible = contributors.slice(0, CONTRIBUTORS_PER_PAGE);

            if (!contributors.length) {
                return `
                    <div>
                        <h3 class="text-off-white font-sans font-bold text-sm tracking-widest uppercase mb-4">Contributors</h3>
                        <p class="text-ash-gray text-sm leading-relaxed">No contributors are listed yet.</p>
                    </div>
                `;
            }

            return `
                <div>
                    <button type="button" onclick="openContributorCatalog(1)" class="w-full flex items-center justify-between gap-3 text-left text-off-white hover:text-ash-gray transition-colors mb-4">
                        <span class="font-sans font-bold text-sm tracking-widest uppercase">Contributors</span>
                        <span class="text-[10px] text-deep-red font-sans uppercase tracking-[0.16em]">${contributors.length} total</span>
                    </button>
                    <ul class="space-y-4">
                        ${visible.map((contributor) => `
                            <li class="flex items-center gap-3">
                                ${contributorAvatar(contributor)}
                                <div class="min-w-0">
                                    <div class="text-sm text-off-white font-medium truncate">${escapeHTML(contributor.name)}</div>
                                    <div class="text-xs text-ash-gray truncate">${escapeHTML(contributor.role || `${contributor.postCount} piece${contributor.postCount === 1 ? "" : "s"}`)}</div>
                                </div>
                            </li>
                        `).join("")}
                    </ul>
                    ${contributors.length > CONTRIBUTORS_PER_PAGE ? `
                        <button type="button" onclick="openContributorCatalog(1)" class="mt-5 text-deep-red text-sm font-medium hover:text-off-white transition-colors">
                            View all contributors
                        </button>
                    ` : ""}
                </div>
            `;
        }

        function renderContributorCatalogModal(page = contributorCatalogPage) {
            const contributors = getContributorCatalog();
            const totalPages = Math.max(1, Math.ceil(contributors.length / CONTRIBUTORS_PER_PAGE));
            contributorCatalogPage = Math.min(Math.max(1, page), totalPages);
            const start = (contributorCatalogPage - 1) * CONTRIBUTORS_PER_PAGE;
            const visible = contributors.slice(start, start + CONTRIBUTORS_PER_PAGE);
            const modalBody = document.getElementById("contributors-catalog-body");
            const modalMeta = document.getElementById("contributors-catalog-meta");
            const prev = document.getElementById("contributors-prev");
            const next = document.getElementById("contributors-next");

            if (!modalBody || !modalMeta) return;

            modalMeta.textContent = contributors.length
                ? `Page ${contributorCatalogPage} of ${totalPages} / ${contributors.length} contributor${contributors.length === 1 ? "" : "s"}`
                : "No contributors listed yet";

            modalBody.innerHTML = visible.map((contributor) => `
                <article class="border border-border-gray bg-[#101010] p-4 md:p-5">
                    <div class="flex items-start gap-4">
                        ${contributorAvatar(contributor, "w-12 h-12", "text-lg")}
                        <div class="min-w-0 flex-1">
                            <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-2">
                                <div>
                                    <h3 class="text-off-white font-sans font-semibold leading-tight">${escapeHTML(contributor.name)}</h3>
                                    ${contributor.role ? `<p class="text-xs text-ash-gray mt-1">${escapeHTML(contributor.role)}</p>` : ""}
                                </div>
                                <span class="text-[10px] text-deep-red uppercase tracking-[0.16em] font-sans">${contributor.postCount} piece${contributor.postCount === 1 ? "" : "s"}</span>
                            </div>
                            ${contributor.bio ? `<p class="text-sm text-ash-gray leading-relaxed mt-3">${escapeHTML(contributor.bio)}</p>` : ""}
                            ${Array.isArray(contributor.links) && contributor.links.length ? `
                                <div class="flex flex-wrap gap-2 mt-3">
                                    ${contributor.links.map((link) => `<a href="${escapeHTML(link)}" target="_blank" rel="noopener noreferrer" class="text-xs text-deep-red hover:text-off-white transition-colors break-all">${escapeHTML(link)}</a>`).join("")}
                                </div>
                            ` : ""}
                            <div class="mt-4 border-t border-border-gray pt-3 space-y-2">
                                ${contributor.posts.slice(0, 4).map((post) => `
                                    <a href="${escapeHTML(post.url)}" class="block text-sm text-off-white hover:text-ash-gray transition-colors">
                                        ${escapeHTML(post.title)}
                                        ${post.date ? `<span class="text-xs text-ash-gray"> / ${escapeHTML(post.date)}</span>` : ""}
                                    </a>
                                `).join("")}
                            </div>
                        </div>
                    </div>
                </article>
            `).join("");

            if (prev) prev.disabled = contributorCatalogPage <= 1;
            if (next) next.disabled = contributorCatalogPage >= totalPages;
        }

        function openContributorCatalog(page = 1) {
            const modal = document.getElementById("contributors-catalog-modal");
            if (!modal) return;
            modal.classList.remove("hidden");
            modal.setAttribute("aria-hidden", "false");
            document.body.style.overflow = "hidden";
            renderContributorCatalogModal(page);
        }

        function closeContributorCatalog() {
            const modal = document.getElementById("contributors-catalog-modal");
            if (!modal) return;
            modal.classList.add("hidden");
            modal.setAttribute("aria-hidden", "true");
            document.body.style.overflow = "";
        }

        function changeContributorCatalogPage(direction) {
            renderContributorCatalogModal(contributorCatalogPage + direction);
        }

        document.addEventListener("click", (event) => {
            if (event.target && event.target.id === "contributors-catalog-modal") {
                closeContributorCatalog();
            }
        });

        document.addEventListener("keydown", (event) => {
            if (event.key === "Escape") {
                closeContributorCatalog();
            }
        });

        // View 1: The Blog Index
        function updatePostQuery(post) {
            try {
                if (post) {
                    const slug = post.slug || post.id;
                    window.history.replaceState({}, "", `/blog/${encodeURIComponent(slug)}/`);
                } else {
                    window.history.replaceState({}, "", "/blog");
                }
            } catch (error) {
                const url = new URL(window.location.href);
                if (post) {
                    url.searchParams.set("post", post.slug || post.id);
                } else {
                    url.searchParams.delete("post");
                }
                window.history.replaceState({}, "", url.toString());
            }
        }

            let html = `

                    <div class="flex flex-col md:flex-row gap-12">
                        
                        <!-- Main Feed (Left/Center) -->
                        <div class="w-full md:w-2/3">

                            <div class="space-y-12">
            `;

            posts.forEach(post => {
                const postUrl = getPostUrl(post);
                const thumbnail = post.featureImage || post.shareImage || "";
                const bylineAuthor = post.displayAuthor || post.author || "Anonymous contributor";
                const authorInitial = String(bylineAuthor || "A").trim().charAt(0) || "A";
                const indexEngagementKey = escapeHTML(String(post.slug || post.id || ""));
                html += `
                    <article class="blog-index-card group">
                        <a href="${postUrl}" class="block cursor-pointer">
                            <div class="blog-index-grid ${thumbnail ? "" : "no-thumbnail"}">
                                <div class="min-w-0">
                                    <!-- Meta -->
                                    <div class="flex items-center gap-3 mb-3 text-sm text-ash-gray font-sans min-w-0">
                                        <span class="blog-index-avatar" aria-hidden="true">
                                            ${post.authorImg ? `<img src="${escapeHTML(post.authorImg)}" alt="">` : escapeHTML(authorInitial)}
                                        </span>
                                        <span class="min-w-0">
                                            <span class="block font-medium text-off-white truncate">${escapeHTML(bylineAuthor)}</span>
                                            <span class="block text-xs text-ash-gray">${escapeHTML(post.displayDateShort || post.date)}</span>
                                        </span>
                                    </div>

                                    <!-- Titles -->
                                    <h2 class="blog-index-title font-serif font-bold text-off-white mb-2 group-hover:text-ash-gray transition-colors">${escapeHTML(post.title)}</h2>
                                    <p class="blog-index-subtitle text-ash-gray text-[15px] md:text-[16px] leading-snug mb-4 font-sans">${escapeHTML(post.subtitle)}</p>
                                </div>

                                ${thumbnail ? `
                                    <div class="blog-index-thumb" aria-hidden="true">
                                        <img src="${escapeHTML(thumbnail)}" alt="">
                                    </div>
                                ` : ""}
                            </div>
                        </a>
                        <!-- Action Row -->
                        <div class="flex items-center gap-6 mt-4 border-t border-border-gray pt-3 opacity-80 group-hover:opacity-100 transition-opacity">
                            <div class="action-btn" title="View Citations">
                                <i class="ph ph-seal-check text-lg"></i>
                                <span>${post.citations}</span>
                            </div>
                            <div class="action-btn" title="View Comments">
                                <i class="ph ph-chat-circle text-lg"></i>
                                <span data-index-comments="${indexEngagementKey}">${formatCount(post.comments)}</span>
                            </div>
                            <div class="action-btn" title="Article Views">
                                <i class="ph ph-eye text-lg"></i>
                                <span data-index-views="${indexEngagementKey}">${formatCount(post.viewCount)}</span>
                            </div>
                            <div class="action-btn ml-auto" onclick='sharePost(event, ${JSON.stringify(post.id)})' title="Share">
                                <i class="ph ph-share-network text-lg"></i>
                            </div>
                        </div>
                    </article>
                `;
            });

            html += `
                            </div>
                        </div>

                        <!-- Sidebar (Right) -->
                        <aside class="w-full md:w-1/3 space-y-10 pl-0 md:pl-8 md:border-l border-border-gray h-fit sticky top-12">
                            
                            <!-- About Box -->
                            <div>
                                <h3 class="text-off-white font-sans font-bold text-sm tracking-widest uppercase mb-4">About the Blog</h3>
                                <p class="text-ash-gray text-sm leading-relaxed mb-4">
                                    The Blog is the narrative layer of the Archive. While Echoes of Gaza documents the historical record, this space centers the lived experiences behind it.
                                </p>
                                <p class="text-ash-gray text-sm leading-relaxed mb-4">
                                    We welcome thoughtful essays, personal stories, and creative work from new and returning writers.
                                </p>
                                <p class="text-ash-gray text-sm leading-relaxed">
                                    Interested in writing for the blog? Reach out to us at
                                    <a href="mailto:blog@echoesofgaza.org" class="text-deep-red hover:text-off-white transition-colors">blog@echoesofgaza.org</a>
                                    with your idea.
                                </p>
                            </div>

                            <!-- Contributors -->
                            ${renderContributorSidebar()}

                        </aside>
                    </div>
                    <div id="contributors-catalog-modal" class="hidden fixed inset-0 z-[120] bg-black/80 backdrop-blur-sm px-4 py-6 md:py-10" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="contributors-catalog-title">
                        <div class="max-w-3xl mx-auto max-h-[calc(100vh-3rem)] md:max-h-[calc(100vh-5rem)] border border-border-gray bg-deep-black shadow-2xl flex flex-col">
                            <div class="flex items-start justify-between gap-4 border-b border-border-gray p-5 md:p-6">
                                <div>
                                    <p class="text-deep-red text-xs font-bold uppercase tracking-[0.22em] mb-2">Blog Catalog</p>
                                    <h2 id="contributors-catalog-title" class="font-serif text-3xl text-off-white leading-tight">Contributors</h2>
                                    <p id="contributors-catalog-meta" class="text-xs text-ash-gray mt-2 font-sans uppercase tracking-[0.14em]"></p>
                                </div>
                                <button type="button" onclick="closeContributorCatalog()" class="border border-border-gray px-3 py-2 text-xs text-off-white hover:border-deep-red hover:bg-hover-bg transition" aria-label="Close contributors catalog">
                                    Close
                                </button>
                            </div>
                            <div id="contributors-catalog-body" class="overflow-y-auto p-4 md:p-6 space-y-4"></div>
                            <div class="flex items-center justify-between gap-3 border-t border-border-gray p-4 md:p-5">
                                <button id="contributors-prev" type="button" onclick="changeContributorCatalogPage(-1)" class="border border-border-gray px-4 py-2 text-xs font-bold uppercase tracking-[0.16em] text-off-white hover:border-deep-red hover:bg-hover-bg transition disabled:opacity-30 disabled:pointer-events-none">Previous</button>
                                <button id="contributors-next" type="button" onclick="changeContributorCatalogPage(1)" class="border border-border-gray px-4 py-2 text-xs font-bold uppercase tracking-[0.16em] text-off-white hover:border-deep-red hover:bg-hover-bg transition disabled:opacity-30 disabled:pointer-events-none">Next</button>
                            </div>
                        </div>
                    </div>
                </div>`;
            
            container.innerHTML = html;
            hydrateBlogIndexEngagement();
        }

        // View 2: The Article Page
        function renderPost(id, updateUrl = false) {
            window.scrollTo(0, 0);
            const post = findPostByKey(id);
            if (!post) return;
            if (updateUrl) updatePostQuery(post);
            setSeoMeta(post);
            const bylineAuthor = post.displayAuthor || post.author;
            const bylineDate = post.displayDateShort || post.date;

            container.innerHTML = `
                <div class="blog-post-shell mx-auto px-5 py-10 md:py-12 fade-in">
                    
                    <!-- Post Header -->
                    <header class="blog-lede-panel blog-post-lede mb-8 pb-8 md:pb-10">
                        <button type="button" class="blog-breadcrumb mb-4 cursor-pointer hover:text-off-white transition-colors" onclick="renderIndex()">
                            Echoes of Gaza / Voices / Article
                        </button>
                        
                        <h1 class="post-title text-[40px] md:text-[56px] font-bold text-off-white mb-4">${post.title}</h1>
                        <h2 class="post-subtitle text-[20px] md:text-[22px] mb-8 font-sans">${post.subtitle}</h2>

                        <!-- Author Block -->
                        <div class="flex items-center justify-between gap-5">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 bg-border-gray rounded-full flex items-center justify-center text-off-white font-serif italic text-lg border border-[#333] overflow-hidden">
                                    ${post.authorImg ? `<img src="${escapeHTML(post.authorImg)}" alt="${escapeHTML(bylineAuthor)}" class="w-full h-full object-cover">` : escapeHTML(bylineAuthor.charAt(0))}
                                </div>
                                <div class="flex flex-col">
                                    <span class="text-sm font-medium text-off-white cursor-pointer hover:underline">${escapeHTML(bylineAuthor)}</span>
                                    ${post.role || post.authorLocation ? `<span class="text-xs text-ash-gray">${escapeHTML([post.role, post.authorLocation].filter(Boolean).join(" / "))}</span>` : ""}
                                    <span class="text-xs text-ash-gray">${escapeHTML(bylineDate)} &bull; ${escapeHTML(post.readTime)}</span>
                                </div>
                            </div>
                            
                            <!-- Share Actions -->
                            <div class="flex items-center gap-4 text-ash-gray pl-4 ml-4">
                                <div class="action-btn" title="View Citations">
                                    <i class="ph ph-seal-check text-xl"></i>
                                    <span class="text-sm">${post.citations}</span>
                                </div>
                                <div class="action-btn" onclick='sharePost(event, ${JSON.stringify(post.id)})' title="Share">
                                    <i class="ph ph-share-network text-xl"></i>
                                </div>
                            </div>
                        </div>
                    </header>

                    <div class="blog-post-body">
                        ${shouldRenderFeatureImage(post) ? `
                            <figure class="mb-8">
                                <img src="${escapeHTML(post.featureImage || post.shareImage)}" alt="${escapeHTML(post.title)}" class="w-full rounded-sm object-cover border border-border-gray opacity-90">
                            </figure>
                        ` : ""}

                        <!-- Body -->
                        <article class="prose-content">
                            ${post.content}
                        </article>

                        ${post.authorBio ? `
                          <section class="mt-10 p-5 border border-border-gray bg-[#111] rounded-sm">
                            <div class="flex items-start gap-4">
                              <div class="w-12 h-12 bg-border-gray rounded-full flex items-center justify-center text-off-white font-serif italic text-lg border border-[#333] overflow-hidden shrink-0">
                                ${post.authorImg ? `<img src="${escapeHTML(post.authorImg)}" alt="${escapeHTML(post.author)}" class="w-full h-full object-cover">` : escapeHTML(String(post.author || "A").charAt(0))}
                              </div>
                              <div>
                                <p class="text-xs uppercase tracking-[0.18em] text-deep-red font-bold mb-2">About the writer</p>
                                <h3 class="text-off-white font-sans font-semibold mb-1">${escapeHTML(post.author)}</h3>
                                ${post.role ? `<p class="text-xs text-ash-gray mb-3">${escapeHTML(post.role)}</p>` : ""}
                                <p class="text-sm text-ash-gray leading-relaxed">${escapeHTML(post.authorBio)}</p>
                                ${Array.isArray(post.authorLinks) && post.authorLinks.length ? `
                                  <div class="flex flex-wrap gap-3 mt-3">
                                    ${post.authorLinks.map((link) => `<a href="${escapeHTML(link)}" target="_blank" rel="noopener noreferrer" class="text-xs text-deep-red hover:text-off-white transition-colors break-all">${escapeHTML(link)}</a>`).join("")}
                                  </div>
                                ` : ""}
                              </div>
                            </div>
                          </section>
                        ` : ""}

                        <!-- Editor's Note -->
                        <section class="mt-8 p-4 border border-border-gray bg-[#111] rounded-sm">
                            <p class="text-xs uppercase tracking-[0.18em] text-deep-red font-bold mb-2">Editor’s Note</p>
                            <p class="text-sm text-ash-gray leading-relaxed">
                                The Echoes of Gaza archive is an anti-Zionist space committed to Palestinian liberation.
                                We publish personal narratives that reflect a range of lived experiences and perspectives within that struggle.
                                The views expressed in this piece are the author’s own.
                            </p>
                        </section>

                    <div class="mt-16 mb-20 blog-engagement-panel py-5">
                        <div class="flex flex-wrap items-center gap-5 pb-5">
                            <div class="action-btn cursor-default" title="Article views">
                                <i class="ph ph-eye text-xl"></i>
                                <span id="post-view-count" class="text-sm">${formatCount(post.viewCount)} views</span>
                            </div>
                            <div class="action-btn cursor-default" title="Responses">
                                <i class="ph ph-chat-circle text-xl"></i>
                                <span id="post-comments-count" class="text-sm">${formatCount(post.comments)} responses</span>
                            </div>
                            <div class="action-btn ml-auto" onclick='sharePost(event, ${JSON.stringify(post.id)})' title="Share">
                                <i class="ph ph-share-network text-xl"></i>
                            </div>
                        </div>

                        <section class="pt-5 border-t border-border-gray">
                            <h3 id="post-comment-count-heading" class="font-sans font-bold text-sm uppercase tracking-widest text-off-white mb-5">Responses (${formatCount(post.comments)})</h3>
                            <div id="comments-list" class="mb-7">
                                <p class="text-sm text-ash-gray font-sans italic">Loading responses...</p>
                            </div>

                            <form class="space-y-3" onsubmit='submitBlogComment(event, ${JSON.stringify(post.id)}, ${JSON.stringify(post.slug)})'>
                                <div>
                                    <label class="block text-[10px] text-ash-gray font-sans uppercase tracking-[0.18em] mb-2">Name</label>
                                    <input name="authorName" class="comment-field px-3 py-2" maxlength="80" required placeholder="Your name" value="${escapeHTML(localStorage.getItem("echoesBlogCommentName") || "")}">
                                </div>
                                <div>
                                    <label class="block text-[10px] text-ash-gray font-sans uppercase tracking-[0.18em] mb-2">Response</label>
                                    <textarea name="comment" class="comment-field px-3 py-3 min-h-[110px]" maxlength="2000" required placeholder="Write a response..."></textarea>
                                </div>
                                <div class="flex flex-col sm:flex-row sm:items-center gap-3 justify-between">
                                    <p id="comment-status" class="text-xs text-ash-gray font-sans min-h-4"></p>
                                    <button type="submit" class="border border-[#8C0D0D] px-4 py-2 text-[11px] text-off-white font-sans uppercase tracking-[0.16em] hover:bg-[#8C0D0D]/15 transition disabled:opacity-50 disabled:pointer-events-none">
                                        Post Response
                                    </button>
                                </div>
                            </form>
                        </section>
                    </div>
                    </div>
                </div>
            `;
            loadBlogEngagement(post, true);
        }

        // Initialize
        async function initializePage() {
            await loadPublishedBlogPosts();
            const params = new URLSearchParams(window.location.search);
            const requestedPost = params.get("post") || getRequestedPostKeyFromPath();
            if (!requestedPost) {
                renderIndex();
                return;
            }

            const normalized = requestedPost.trim().toLowerCase();
            const post = findPostByKey(normalized);

            if (post) {
                renderPost(post.slug || post.id, true);
            } else {
                renderIndex();
            }
        }

        initializePage();

    </script>
</body>
</html>
